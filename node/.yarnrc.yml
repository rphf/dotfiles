# Global Yarn Berry configuration
# Managed via dotfiles — stow target: ~/

# Skip lifecycle scripts from third-party packages
enableScripts: false

# Reject packages published less than 7 days ago
npmMinimalAgeGate: "7d"

# Enforce SSL for all registry requests
enableStrictSsl: true

# Validate lockfile content against remote registries
enableHardenedMode: true
